<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Mike — Définir mon mot de passe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --accent:  #FF6B00;
      --text:    #f0f0f0;
      --muted:   #888;
      --danger:  #e53e3e;
      --border:  #2e2e2e;
      --font:    'DM Mono', 'Courier New', monospace;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── BROWSER BANNER ── */
    #browser-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      padding: 12px 16px;
      text-align: center;
      z-index: 100;
      display: none;
    }
    #browser-banner.visible { display: block; }
    #browser-banner a {
      color: #fff;
      text-decoration: underline;
      font-weight: bold;
      margin-left: 8px;
    }
    #btn-copy {
      display: inline-block;
      margin-left: 8px;
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      cursor: pointer;
      font-family: var(--font);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-logo {
      color: var(--accent);
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 16px;
      font-weight: bold;
    }
    .card-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: -8px;
    }

    input[type=password] {
      background: #242424;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
    }
    input[type=password]:focus { border-color: var(--accent); }

    button.btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.btn-primary:hover  { opacity: 0.85; }
    button.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg { color: var(--danger); font-size: 12px; }
    .hidden    { display: none !important; }

    /* ── SUCCESS / INSTALL ── */
    #success-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .install-check {
      font-size: 40px;
      text-align: center;
    }
    .install-title {
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
    .install-subtitle {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }
    .install-steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 4px 0;
    }
    .install-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #242424;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .step-num {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      min-width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .step-text {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
    }
    .step-text strong { color: var(--accent); }
    .install-skip {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      padding: 4px;
      text-decoration: underline;
    }

    /* ── LOADING ── */
    #loading-block { color: var(--muted); font-size: 13px; text-align: center; }
    #invalid-block { color: var(--danger); font-size: 13px; text-align: center; line-height: 1.6; }

    #form-block {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card-sub { margin-top: 0; }
  </style>
</head>
<body>

  <!-- Banner navigateur -->
  <div id="browser-banner">
    <span id="banner-text"></span>
    <button id="btn-copy">Copier le lien</button>
  </div>

  <div class="card">
    <div class="card-logo">Coach Mike</div>

    <!-- Chargement -->
    <div id="loading-block">Vérification du lien…</div>

    <!-- Lien invalide / expiré -->
    <div id="invalid-block" class="hidden">
      Ce lien est invalide ou a expiré.<br>
      Contactez votre coach pour en recevoir un nouveau.
    </div>

    <!-- Formulaire -->
    <div id="form-block" class="hidden">
      <div class="card-title">Bienvenue !</div>
      <div class="card-sub">Choisissez votre mot de passe pour accéder à l'application.</div>
      <input type="password" id="pw1" placeholder="Mot de passe (min. 6 car.)" autocomplete="new-password" />
      <input type="password" id="pw2" placeholder="Confirmer le mot de passe"  autocomplete="new-password" />
      <p class="error-msg hidden" id="pw-err"></p>
      <button class="btn-primary" id="btn-save">Enregistrer et accéder à l'app</button>
    </div>

    <!-- Succès + guide installation -->
    <div id="success-block" class="hidden">
      <div class="install-check">✓</div>
      <div class="install-title">Mot de passe enregistré !</div>
      <div class="install-subtitle">Installez l'application sur votre écran d'accueil pour y accéder en un tap.</div>
      <div class="install-steps" id="install-steps"></div>
      <button class="btn-primary" id="btn-open-app">Accéder à l'application</button>
      <button class="install-skip" id="btn-skip">Passer cette étape</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    /* ── DÉTECTION DEVICE ── */
    const ua      = navigator.userAgent;
    const isIOS   = /iPhone|iPad|iPod/.test(ua);
    const isAnd   = /Android/.test(ua);
    const isSafari = /Safari/.test(ua) && !/Chrome|CriOS|FxiOS|OPiOS/.test(ua);
    const isChrome = /Chrome/.test(ua) && !/Edg\//.test(ua) && !/CriOS/.test(ua);

    /* ── BANNER NAVIGATEUR ── */
    (function() {
      const banner  = document.getElementById('browser-banner');
      const txt     = document.getElementById('banner-text');
      const btnCopy = document.getElementById('btn-copy');
      const url     = window.location.href;

      if (isIOS && !isSafari) {
        txt.textContent = 'Pour installer l\'app, ouvrez ce lien dans Safari.';
        banner.classList.add('visible');
      } else if (isAnd && !isChrome) {
        txt.textContent = 'Pour installer l\'app, ouvrez ce lien dans Chrome.';
        banner.classList.add('visible');
      }

      btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(url).then(() => {
          btnCopy.textContent = 'Copié !';
          setTimeout(() => { btnCopy.textContent = 'Copier le lien'; }, 2000);
        });
      });
    })();

    /* ── GUIDE D'INSTALLATION ── */
    function renderInstallSteps() {
      const container = document.getElementById('install-steps');
      let steps;

      if (isIOS) {
        steps = [
          { t: 'Appuyez sur <strong>Partager</strong> (l\'icône carré avec une flèche vers le haut) en bas de Safari.' },
          { t: 'Faites défiler et appuyez sur <strong>« Sur l\'écran d\'accueil »</strong>.' },
          { t: 'Appuyez sur <strong>Ajouter</strong> en haut à droite.' },
        ];
      } else if (isAnd) {
        steps = [
          { t: 'Appuyez sur le menu <strong>⋮</strong> en haut à droite de Chrome.' },
          { t: 'Appuyez sur <strong>« Ajouter à l\'écran d\'accueil »</strong> ou <strong>« Installer l\'application »</strong>.' },
          { t: 'Confirmez en appuyant sur <strong>Installer</strong>.' },
        ];
      } else {
        steps = [
          { t: 'Ouvrez ce lien sur votre <strong>iPhone (Safari)</strong> ou <strong>Android (Chrome)</strong>.' },
          { t: 'Suivez les instructions pour l\'ajouter à votre écran d\'accueil.' },
        ];
      }

      container.innerHTML = steps.map((s, i) => `
        <div class="install-step">
          <div class="step-num">${i + 1}</div>
          <div class="step-text">${s.t}</div>
        </div>`).join('');
    }

    /* ── GESTION DU TOKEN SUPABASE ── */
    const loadingEl = document.getElementById('loading-block');
    const invalidEl = document.getElementById('invalid-block');
    const formEl    = document.getElementById('form-block');
    const successEl = document.getElementById('success-block');

    function showBlock(id) {
      [loadingEl, invalidEl, formEl, successEl].forEach(el => el.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    // Supabase v2 détecte automatiquement le hash de recovery
    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showBlock('form-block');
      } else if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
        showBlock('form-block');
      }
    });

    // Timeout si aucun événement recovery n'arrive (lien invalide)
    setTimeout(() => {
      if (!formEl.classList.contains('hidden')) return;
      if (!successEl.classList.contains('hidden')) return;
      showBlock('invalid-block');
    }, 4000);

    // Vérifier la session au chargement (cas où l'event arrive avant le listener)
    db.auth.getSession().then(({ data: { session } }) => {
      const hash = window.location.hash;
      if (session && hash.includes('type=recovery')) {
        showBlock('form-block');
      }
    });

    /* ── ENREGISTREMENT DU MOT DE PASSE ── */
    document.getElementById('btn-save').addEventListener('click', async () => {
      const pw1   = document.getElementById('pw1').value;
      const pw2   = document.getElementById('pw2').value;
      const errEl = document.getElementById('pw-err');
      const btn   = document.getElementById('btn-save');
      errEl.classList.add('hidden');

      if (pw1.length < 6) {
        errEl.textContent = 'Le mot de passe doit faire au moins 6 caractères.';
        errEl.classList.remove('hidden');
        return;
      }
      if (pw1 !== pw2) {
        errEl.textContent = 'Les mots de passe ne correspondent pas.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      const { error } = await db.auth.updateUser({ password: pw1 });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Enregistrer et accéder à l\'app';
        return;
      }

      renderInstallSteps();
      showBlock('success-block');

      document.getElementById('btn-open-app').addEventListener('click', () => {
        window.location.href = '/';
      });
      document.getElementById('btn-skip').addEventListener('click', () => {
        window.location.href = '/';
      });
    });
  </script>
</body>
</html>
