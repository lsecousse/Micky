<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach Mike" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Coach Mike</title>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <canvas id="loading-canvas"></canvas>
    <p id="loading-title">Coach Mike</p>
    <p id="loading-sub" class="app-version"></p>
  </div>

  <div id="app">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="home-header">
        <canvas id="home-canvas"></canvas>
        <h1 class="home-title">Coach Mike</h1>
        <p class="home-sub app-version"></p>
      </div>
      <div class="home-main" id="home-main"></div>
      <div class="home-footer">
        <button class="home-footer-btn" id="go-history">Historique</button>
        <button class="home-footer-btn" id="go-stats">Stats</button>
        <button class="home-footer-btn" id="go-params">Paramètres</button>
      </div>
    </div>

    <!-- À LA SALLE -->
    <div id="screen-seance" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-seance">←</button>
        <span class="screen-title">À la salle</span>
      </div>
      <div class="screen-body" id="screen-seance-body"></div>
    </div>

    <!-- HISTORIQUE -->
    <div id="screen-history" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-history">←</button>
        <span class="screen-title">Historique</span>
      </div>
      <div class="screen-body">
        <div id="history-list"></div>
      </div>
    </div>

    <!-- STATS -->
    <div id="screen-stats" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-stats">←</button>
        <span class="screen-title">Statistiques</span>
      </div>
      <div class="screen-body" id="screen-stats-body"></div>
    </div>

    <!-- PARAMÈTRES -->
    <div id="screen-params" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-params">←</button>
        <span class="screen-title">Paramètres</span>
      </div>
      <div class="screen-body" id="screen-params-body"></div>
    </div>

    <!-- LOGIN -->
    <div id="screen-login" class="screen">
      <div class="login-wrap">
        <canvas id="login-canvas"></canvas>
        <h1 class="login-title">Coach Mike</h1>

        <div id="login-form">
          <input type="email"    id="login-email"    placeholder="Email"        autocomplete="email"            inputmode="email" />
          <input type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password" />
          <button class="btn-primary btn-full" id="btn-login">Se connecter</button>
          <p class="auth-error hidden" id="login-error"></p>
        </div>
      </div>
    </div>

  </div>

  <!-- COUNTDOWN FULLSCREEN -->
  <div id="countdown-bar" class="hidden">
    <span class="countdown-label">Temps de repos</span>
    <div class="countdown-ring-wrap">
      <svg class="countdown-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="85" />
        <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="85" />
      </svg>
      <span id="countdown-display">00:00</span>
    </div>
    <button id="countdown-skip">Passer</button>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden"></div>

  <!-- DIALOG CUSTOM -->
  <div id="dialog" class="dialog hidden">
    <div class="dialog-box">
      <p id="dialog-msg"></p>
      <div class="dialog-actions">
        <button id="dialog-cancel" class="btn-secondary">Annuler</button>
        <button id="dialog-ok" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- MODAL DÉTAIL SÉANCE -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- import file input (global) -->
  <input type="file" id="import-file" accept=".json" hidden />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
