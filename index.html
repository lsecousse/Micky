<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach Mike" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <!-- iPhone 16 Pro Max -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1320x2868.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 16 Pro -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1206x2622.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 16 Plus / 15 Plus / 14 Plus / 14 Pro Max / 15 Pro Max -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 16 / 15 / 14 -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 15 Pro / 14 Pro -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 13 mini / 12 mini -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 11 Pro Max / XS Max -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
  <!-- iPhone 11 / XR -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-828x1792.png"  media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPhone SE / 8 / 7 / 6s -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-750x1334.png"  media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPhone SE 1st / 5s -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-640x1136.png"  media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPad Pro 12.9" -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPad Pro 11" / Air 10.9" -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPad 10th gen -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1640x2360.png" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPad mini 6 -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1488x2266.png" media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2)" />
  <!-- iPad 9th gen -->
  <link rel="apple-touch-startup-image" href="icons/splash/splash-1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Gym Tracker</title>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <canvas id="loading-canvas"></canvas>
    <p id="loading-title">Gym Tracker</p>
    <p id="loading-sub">Coach Mike</p>
  </div>

  <div id="app">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="home-header">
        <canvas id="home-canvas"></canvas>
        <h1 class="home-title">Gym Tracker</h1>
        <p class="home-sub">Coach Mike</p>
      </div>
      <div class="home-main" id="home-main"></div>
      <div class="home-footer">
        <button class="home-footer-btn" id="go-history">Historique</button>
        <button class="home-footer-btn" id="go-params">Paramètres</button>
      </div>
    </div>

    <!-- À LA SALLE -->
    <div id="screen-seance" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-seance">←</button>
        <span class="screen-title">À la salle</span>
      </div>
      <div class="screen-body" id="screen-seance-body"></div>
    </div>

    <!-- HISTORIQUE -->
    <div id="screen-history" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-history">←</button>
        <span class="screen-title">Historique</span>
      </div>
      <div class="screen-body">
        <div id="history-list"></div>
      </div>
    </div>

    <!-- PARAMÈTRES -->
    <div id="screen-params" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-params">←</button>
        <span class="screen-title">Paramètres</span>
      </div>
      <div class="screen-body" id="screen-params-body"></div>
    </div>

  </div>

  <!-- COUNTDOWN FULLSCREEN -->
  <div id="countdown-bar" class="hidden">
    <span class="countdown-label">Temps de repos</span>
    <span id="countdown-display">00:00</span>
    <button id="countdown-skip">Passer</button>
  </div>

  <!-- DIALOG CUSTOM -->
  <div id="dialog" class="dialog hidden">
    <div class="dialog-box">
      <p id="dialog-msg"></p>
      <div class="dialog-actions">
        <button id="dialog-cancel" class="btn-secondary">Annuler</button>
        <button id="dialog-ok" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- MODAL DÉTAIL SÉANCE -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- import file input (global) -->
  <input type="file" id="import-file" accept=".json" hidden />

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
