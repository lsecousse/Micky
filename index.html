<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coach Mike" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>Coach Mike</title>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <img src="icons/logo.jpg" id="loading-logo" />
    <p id="loading-title">Coach Mike</p>
    <p id="loading-sub" class="app-version"></p>
  </div>

  <div id="app">

    <!-- HOME -->
    <div id="screen-home" class="screen active">
      <div class="home-header">
        <img src="icons/logo.jpg" class="home-logo" />
        <h1 class="home-title">Coach Mike</h1>
        <p class="home-sub app-version"></p>
        <button class="home-user-btn" id="user-menu-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <div class="user-dropdown hidden" id="user-dropdown"></div>
      </div>
      <div class="home-main" id="home-main"></div>
      <div class="home-footer">
        <button class="home-footer-btn" id="go-corps"><span class="btn-icon">⚖️</span>Données corporelles</button>
        <button class="home-footer-btn" id="go-history"><span class="btn-icon">📋</span>Historique</button>
        <button class="home-footer-btn" id="go-stats"><span class="btn-icon">📈</span>Stats</button>
        <button class="home-footer-btn" id="go-params"><span class="btn-icon">⚙️</span>Programmes</button>
      </div>
    </div>

    <!-- PROFIL -->
    <div id="screen-profil" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-profil">←</button>
        <span class="screen-title">Profil</span>
      </div>
      <div class="screen-body" id="screen-profil-body"></div>
    </div>

    <!-- CLÉ API CLAUDE -->
    <div id="screen-claude-api" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-claude-api">←</button>
        <span class="screen-title">Clé API Claude</span>
      </div>
      <div class="screen-body" id="screen-claude-api-body"></div>
    </div>

    <!-- COMPOSITION CORPORELLE -->
    <div id="screen-corps" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-corps">←</button>
        <span class="screen-title">Données corporelles</span>
      </div>
      <div class="screen-body" id="screen-corps-body"></div>
    </div>

    <!-- À LA SALLE -->
    <div id="screen-seance" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-seance">←</button>
        <span class="screen-title">À la salle</span>
      </div>
      <div class="screen-body" id="screen-seance-body"></div>
    </div>

    <!-- HISTORIQUE -->
    <div id="screen-history" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-history">←</button>
        <span class="screen-title">Historique</span>
      </div>
      <div class="screen-body">
        <div id="history-list"></div>
      </div>
    </div>

    <!-- STATS -->
    <div id="screen-stats" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-stats">←</button>
        <span class="screen-title">Statistiques</span>
      </div>
      <div class="screen-body" id="screen-stats-body"></div>
    </div>

    <!-- PARAMÈTRES -->
    <div id="screen-params" class="screen">
      <div class="screen-header">
        <button class="screen-back" id="back-params">←</button>
        <span class="screen-title">Programmes</span>
      </div>
      <div class="screen-body" id="screen-params-body"></div>
    </div>

    <!-- LOGIN -->
    <div id="screen-login" class="screen">
      <div class="login-wrap">
        <img src="icons/logo.jpg" class="login-logo" />
        <h1 class="login-title">Coach Mike</h1>

        <div id="login-form">
          <input type="email"    id="login-email"    placeholder="Email"        autocomplete="email"            inputmode="email" />
          <input type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password" />
          <button class="btn-primary btn-full" id="btn-login">Se connecter</button>
          <p class="auth-error hidden" id="login-error"></p>
        </div>
      </div>
    </div>

  </div>

  <!-- CHRONO FULLSCREEN -->
  <div id="chrono-overlay" class="hidden">
    <span class="countdown-label">⏱ Chrono en cours</span>
    <span id="chrono-exercise-name" class="overlay-exercise-name"></span>
    <div class="countdown-ring-wrap">
      <span id="chrono-display">00:00</span>
    </div>
    <button id="chrono-stop">Stop</button>
  </div>

  <!-- MINUTERIE FULLSCREEN -->
  <div id="minuterie-overlay" class="hidden">
    <span class="countdown-label">⏳ Minuterie</span>
    <span id="minuterie-exercise-name" class="overlay-exercise-name"></span>
    <div class="countdown-ring-wrap">
      <span id="minuterie-display">00:00</span>
    </div>
    <button id="minuterie-stop" class="overlay-stop-btn">Stop</button>
  </div>


  <!-- COUNTDOWN STICKY TOP BAR -->
  <div id="countdown-bar" class="hidden">
    <div class="countdown-ring-wrap">
      <svg class="countdown-ring" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="42" />
        <circle id="ring-progress" class="ring-progress" cx="50" cy="50" r="42" />
      </svg>
      <span id="countdown-display">00:00</span>
    </div>
    <div class="countdown-info">
      <span class="countdown-label">Repos</span>
      <span id="countdown-exercise-name" class="overlay-exercise-name"></span>
    </div>
    <button id="countdown-skip" title="Passer" aria-label="Passer">⏭</button>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden"></div>

  <!-- DIALOG CUSTOM -->
  <div id="dialog" class="dialog hidden">
    <div class="dialog-box">
      <p id="dialog-msg"></p>
      <div class="dialog-actions">
        <button id="dialog-cancel" class="btn-secondary">Annuler</button>
        <button id="dialog-ok" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- MODAL DÉTAIL SÉANCE -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="exercise-editor.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
