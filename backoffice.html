<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coach Mike — Backoffice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #242424;
      --accent:   #9A7A30;
      --text:     #f0f0f0;
      --muted:    #888;
      --danger:   #e53e3e;
      --border:   #2e2e2e;
      --font:     'DM Mono', 'Courier New', monospace;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-box h1 { color: var(--accent); font-size: 22px; margin-bottom: 8px; }
    .login-box p.sub { color: var(--muted); font-size: 12px; margin-top: -8px; margin-bottom: 8px; }

    /* ── LAYOUT ── */
    .bo-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .bo-sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .bo-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    .bo-logo { color: var(--accent); font-size: 16px; font-weight: bold; }
    .bo-clients { flex: 1; overflow-y: auto; padding: 8px 0; }
    .bo-client-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }
    .bo-client-item:hover { background: var(--surface2); }
    .bo-client-item.active { border-left-color: var(--accent); background: var(--surface2); }
    .bo-client-name { font-weight: bold; font-size: 13px; }
    .bo-client-email { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .bo-empty { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }
    .bo-sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }

    /* ── MAIN PANEL ── */
    .bo-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .bo-main-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }
    .bo-detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .bo-detail-header {
      padding: 20px 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .bo-detail-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .bo-state {
      font-size: 11px;
      font-weight: normal;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.03em;
    }
    .bo-state--new              { background: #333; color: #999; }
    .bo-state--invited          { background: #2a2a00; color: #e0c040; }
    .bo-state--password_created { background: #002a1a; color: #40c080; }
    .bo-state--connected        { background: #003300; color: #4caf50; }

    .bo-state-dot {
      font-size: 12px;
      font-weight: normal;
    }

    .bo-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .bo-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .bo-stat-value {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent);
    }
    .bo-stat-unit {
      font-size: 14px;
      font-weight: normal;
      color: var(--muted);
      margin-left: 2px;
    }
    .bo-stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .bo-stat-footer {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }
    .bo-compact-section { margin-bottom: 10px; }
    .bo-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .bo-id-tag { display: inline-flex; align-items: center; gap: 5px; }
    .bo-id-tag + .bo-id-tag::before { content: '·'; color: var(--border); margin-right: 2px; }
    .bo-id-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
    .bo-tabs { display: flex; gap: 0; margin-bottom: -1px; }
    .bo-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .bo-tab.active { background: var(--bg); color: var(--text); border-bottom: 1px solid var(--bg); }
    .bo-detail-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ── PROGRAMME LIST ── */
    .prog-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .prog-row-name { font-weight: bold; }
    .prog-row-count { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .prog-row-actions { display: flex; gap: 8px; }

    /* ── PROGRAMME EDITOR ── */
    .bo-editor { display: flex; flex-direction: column; gap: 12px; }
    .bo-editor-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .exercise-block {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .exercise-block-header {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .exercise-block-fields {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .exercise-block-fields label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── SESSIONS VIEW ── */
    .session-row {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .session-row-header { display: flex; justify-content: space-between; align-items: center; }
    .session-prog { font-weight: bold; font-size: 13px; }
    .session-date { color: var(--muted); font-size: 12px; }
    .session-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 24px;
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal h2 { font-size: 16px; }

    /* ── INPUTS ── */
    input[type=text], input[type=email], input[type=password], input[type=number], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 48px; }

    /* ── BUTTONS ── */
    button { cursor: pointer; font-family: var(--font); font-size: 13px; border: none; border-radius: 6px; padding: 8px 14px; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: bold; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-full { width: 100%; }

    /* ── UTILS ── */
    .error-msg { color: var(--danger); font-size: 12px; }
    .section-title { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; margin-top: 8px; }
    .hidden { display: none !important; }
    .flex-row { display: flex; gap: 8px; align-items: center; }
    .spacer { flex: 1; }

    /* ── EXERCISE CARD (exercise-editor.js) ── */
    .exercise-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .exercise-name-row { display: flex; gap: 6px; align-items: center; }
    .exercise-name { flex: 1; }
    .exercise-move-btn { font-size: 16px; padding: 2px 6px; min-width: 28px; }
    .exercise-sets-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .exercise-sets { width: 56px !important; text-align: center; }
    .activities-list-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .activities-list { display: flex; flex-direction: column; gap: 6px; }
    .exercise-comment { font-size: 12px; }

    .activity-row { display: flex; flex-direction: column; gap: 6px; background: var(--surface2); border-radius: 8px; padding: 8px; }
    .activity-row-top { display: flex; align-items: center; gap: 6px; }
    .activity-row-bottom { display: flex; align-items: center; gap: 6px; padding-left: 4px; }
    .activity-type-btn {
      font-size: 10px; padding: 3px 8px; background: none;
      border: 1px solid var(--border); color: var(--muted);
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .activity-name { flex: 1; min-width: 0; font-size: 13px; }
    .activity-fields { display: flex; align-items: center; gap: 4px; }
    .activity-fields input { width: 52px !important; text-align: center; }
    .activity-sep { font-size: 11px; color: var(--muted); }
    .activity-rest { width: 44px !important; text-align: center; font-size: 12px; }
    .activity-remove-btn {
      background: none; border: none; color: var(--muted);
      font-size: 18px; line-height: 1; padding: 0 2px; margin-left: auto;
    }
    .activity-remove-btn:hover { color: var(--danger); }

    /* ── STATS (progression tab) ── */
    .stats-section { margin-bottom: 14px; }
    .stats-section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    .stats-prog-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .stats-prog-pill {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-family: var(--font);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .stats-prog-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .stats-metric-toggle {
      display: flex; gap: 0; margin-bottom: 16px;
      border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
    }
    .stats-metric-btn {
      flex: 1; padding: 8px 0; text-align: center; font-size: 12px;
      background: var(--surface); color: var(--muted); border: none;
      cursor: pointer; font-family: var(--font);
      border-right: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .stats-metric-btn:last-child { border-right: none; }
    .stats-metric-btn.active { background: var(--accent); color: #fff; }

    .stats-cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 18px;
    }
    .stats-exo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; gap: 6px;
    }
    .stats-exo-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stats-exo-values { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .stats-exo-start { color: var(--muted); }
    .stats-exo-arrow { color: var(--muted); font-size: 12px; }
    .stats-exo-end { color: var(--accent); font-weight: 700; }
    .stats-exo-delta { font-size: 12px; margin-left: auto; font-weight: 600; }
    .stats-exo-delta.up { color: #4caf50; }
    .stats-exo-delta.down { color: #f44336; }
    .stats-exo-delta.neutral { color: var(--muted); }

    .stats-chart-wrap { position: relative; width: 100%; height: 300px; margin-bottom: 8px; }
    .stats-no-data { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

    /* ── RESPONSIVE: sidebar toggle button (hidden on desktop) ── */
    .bo-sidebar-toggle {
      display: none;
      position: fixed;
      top: 12px; left: 12px;
      z-index: 60;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 20px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
    }
    .bo-sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
    }

    /* ── TABLET (≤ 1024px) ── */
    @media (max-width: 1024px) {
      .bo-layout { grid-template-columns: 200px 1fr; }
      .bo-detail-header { padding: 16px 16px 0; }
      .bo-detail-body { padding: 16px; }
      .bo-stat-value { font-size: 22px; }
      .bo-stats-grid { gap: 8px; }
      .bo-tab { padding: 6px 10px; font-size: 11px; }
      .bo-detail-title { font-size: 16px; gap: 8px; }
      .exercise-block-header { grid-template-columns: 1fr auto; }
      .exercise-block-fields { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── MOBILE (≤ 768px) ── */
    @media (max-width: 768px) {
      .bo-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }
      .bo-sidebar {
        position: fixed;
        inset: 0;
        z-index: 50;
        width: 280px;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      .bo-sidebar.open {
        transform: translateX(0);
      }
      .bo-sidebar-overlay.open {
        display: block;
      }
      .bo-sidebar-toggle {
        display: flex;
      }
      .bo-main {
        min-height: 100vh;
      }
      .bo-main-placeholder {
        padding-top: 60px;
      }
      .bo-detail-header {
        padding: 60px 14px 0;
      }
      .bo-detail-body { padding: 14px; }
      .bo-detail-title { font-size: 15px; gap: 6px; }
      .bo-stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .bo-stat-value { font-size: 20px; }
      .bo-stat-card { padding: 12px; }
      .bo-tabs { flex-wrap: wrap; }
      .bo-tab { padding: 6px 10px; font-size: 11px; }
      .stats-cards-grid { grid-template-columns: 1fr 1fr; }
      .stats-chart-wrap { height: 250px; }
      .bo-id-row { font-size: 12px; gap: 4px; padding: 6px 10px; }
      .prog-row { flex-direction: column; align-items: flex-start; gap: 8px; }
      .prog-row-actions { width: 100%; justify-content: flex-end; }
      .exercise-block-header { grid-template-columns: 1fr auto; }
      .exercise-block-fields { grid-template-columns: 1fr 1fr; }
      .session-row-header { flex-direction: column; align-items: flex-start; gap: 4px; }
      .modal { margin: 16px; padding: 20px; }
    }

    /* ── SMALL MOBILE (≤ 480px) ── */
    @media (max-width: 480px) {
      .bo-stats-grid { grid-template-columns: 1fr 1fr; }
      .bo-detail-header { padding: 56px 10px 0; }
      .bo-detail-body { padding: 10px; }
      .exercise-block-fields { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="bo-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="exercise-editor.js"></script>
  <script src="backoffice.js"></script>
</body>
</html>
