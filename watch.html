<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gym Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Azeret+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #121212;
  --surface2: #1a1a1a;
  --surface3: #222;
  --accent: #D4A03C;
  --accent-dim: #B8882E;
  --accent-glow: rgba(212, 160, 60, 0.12);
  --accent-glow2: rgba(212, 160, 60, 0.06);
  --text: #e4e4e4;
  --text-muted: #555;
  --danger: #E94444;
  --border: #1e1e1e;
  --radius: 14px;
  --font: 'Azeret Mono', 'Courier New', monospace;
  --font-display: 'Syne', sans-serif;
}

html, body {
  height: 100%; width: 100%; overflow-x: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 15px;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

/* Noise texture */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ── Screens ── */
.screen {
  display: none; flex-direction: column; min-height: 100vh;
  padding: 16px; padding-top: calc(env(safe-area-inset-top) + 8px);
  padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
  position: relative; z-index: 1;
}
.screen.active { display: flex; }

/* ── Login ── */
#screen-login {
  justify-content: center; align-items: center; gap: 16px; padding: 24px;
}
#screen-login::before {
  content: '⬡';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  font-size: 280px; color: var(--accent); opacity: 0.025;
  pointer-events: none;
}
#screen-login input {
  width: 100%; padding: 14px 16px; border-radius: var(--radius);
  border: 2px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; font-family: var(--font);
  -webkit-appearance: none; appearance: none; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#screen-login input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow2);
}

.btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius);
  font-size: 13px; font-weight: 700; font-family: var(--font-display);
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
}
.btn-accent {
  background: var(--accent); color: #0a0a0a;
  box-shadow: 0 4px 20px rgba(212, 160, 60, 0.25);
}
.btn-accent:active {
  background: var(--accent-dim);
  transform: scale(0.97);
  box-shadow: 0 2px 10px rgba(212, 160, 60, 0.15);
}
.btn-surface {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-surface:active { border-color: var(--accent); color: var(--accent); }

/* ── Programme cards ── */
#screen-home { gap: 12px; }
.prog-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  cursor: pointer; display: flex; flex-direction: column; gap: 6px;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}
.prog-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.prog-card:active { transform: scale(0.98); }
.prog-card:first-child { border-color: var(--accent); }
.prog-card:first-child::before { opacity: 1; }
.prog-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em;
  color: var(--text-muted); font-family: var(--font-display); font-weight: 700;
}
.prog-name {
  font-size: 18px; font-weight: 800; color: var(--accent);
  font-family: var(--font-display);
}
.prog-meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }
.prog-card--active {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--accent-glow) 0%, var(--surface) 100%);
}
.prog-card--active::before { opacity: 1; }

/* ── Live session ── */
#screen-live { padding: 0; justify-content: center; }
#live-body {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; padding: 16px;
  gap: 10px; text-align: center;
  animation: wf-enter 0.3s ease-out;
}
@keyframes wf-enter {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.wf-exercise-name {
  font-size: 15px; font-weight: 800; color: var(--accent);
  font-family: var(--font-display);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.wf-series-label {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.15em;
  font-family: var(--font-display); font-weight: 700;
}
.wf-values {
  display: flex; align-items: baseline; justify-content: center;
  gap: 8px; margin: 10px 0;
}
.wf-val {
  font-size: 32px; font-weight: 700;
  color: var(--text); font-family: var(--font);
  min-width: 40px; text-align: center;
}
.wf-values .wf-sep { font-size: 18px; color: var(--text-muted); font-weight: 300; }
.wf-values .wf-unit { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }

.wf-prev {
  font-size: 11px; color: #7aa2d4; font-style: italic; opacity: 0.7;
}

.wf-done-btn {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid var(--accent); background: none;
  color: var(--accent); font-size: 30px;
  cursor: pointer; margin: 10px 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.wf-done-btn::before {
  content: ''; position: absolute; inset: -7px;
  border-radius: 50%; border: 1px solid var(--accent);
  opacity: 0.15;
}
.wf-done-btn:active {
  background: var(--accent); color: #0a0a0a;
  transform: scale(0.92);
  box-shadow: 0 0 30px rgba(212, 160, 60, 0.4);
}
.wf-done-btn.is-done {
  background: var(--accent); color: #0a0a0a;
  border-color: var(--accent); opacity: 0.45;
  box-shadow: 0 0 20px rgba(212, 160, 60, 0.2);
}

.wf-nav {
  display: flex; gap: 16px; align-items: center; margin-top: 10px;
}
.wf-nav-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.wf-nav-btn:active {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-glow);
}
.wf-nav-btn:disabled { opacity: 0.15; pointer-events: none; }
.wf-dots {
  display: flex; gap: 5px; align-items: center;
}
.wf-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-muted); opacity: 0.2;
  transition: all 0.3s;
}
.wf-dot.active {
  opacity: 1; background: var(--accent);
  width: 20px; border-radius: 4px;
  box-shadow: 0 0 8px rgba(212, 160, 60, 0.4);
}
.wf-dot.done { opacity: 0.5; background: var(--accent); }

.wf-finish {
  position: absolute; top: 12px; right: 14px;
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-size: 10px; color: var(--text-muted); cursor: pointer;
  font-family: var(--font-display); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  text-decoration: none; transition: all 0.15s;
}
.wf-finish:active { border-color: var(--danger); color: var(--danger); }

/* ── Dialog ── */
.dialog-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  justify-content: center; align-items: center; z-index: 100; padding: 24px;
}
.dialog-overlay.active { display: flex; }
.dialog-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px 24px;
  text-align: center; width: 100%; max-width: 280px;
  display: flex; flex-direction: column; gap: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.dialog-msg { font-size: 15px; line-height: 1.5; font-family: var(--font-display); }
.dialog-btns { display: flex; gap: 10px; }
.dialog-btns .btn { flex: 1; padding: 12px; font-size: 12px; }

/* ── Countdown overlay ── */
.countdown-overlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 20px; z-index: 50;
}
.countdown-overlay.hidden { display: none; }

.cd-ring-wrap {
  position: relative; width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
}
.cd-ring { position: absolute; inset: 0; }
.cd-ring-bg { stroke: var(--surface2); }
.cd-ring-progress { transition: stroke-dashoffset 0.9s linear; }
.cd-time-wrap {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
}

.countdown-secs {
  font-size: 64px; font-weight: 800; color: var(--accent);
  font-family: var(--font-display);
  text-shadow: 0 0 40px rgba(212, 160, 60, 0.3);
}
.countdown-label {
  font-size: 12px; color: var(--text-muted); text-align: center;
  font-family: var(--font-display); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
}

/* Countdown urgent state (≤5s) */
.countdown-overlay.urgent .countdown-secs {
  color: var(--danger);
  text-shadow: 0 0 40px rgba(233, 68, 68, 0.4);
  animation: cd-urgent 0.8s ease-in-out infinite;
}
.countdown-overlay.urgent .cd-ring-progress { stroke: var(--danger); }
@keyframes cd-urgent {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.06); }
}

/* ── Greeting ── */
.greeting {
  font-size: 16px; font-weight: 800; color: var(--text);
  padding: 4px 0 12px; font-family: var(--font-display);
}

/* ── Loader ── */
.loader {
  text-align: center; padding: 40px 0; color: var(--text-muted);
  font-size: 12px; letter-spacing: 0.1em;
  text-transform: uppercase; font-family: var(--font-display);
}

/* ── Exercise list ── */
.wf-session-title {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-display); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.15em;
  padding: 4px 0 8px;
}
.wf-ex-list {
  display: flex; flex-direction: column; gap: 8px;
  width: 100%; overflow-y: auto; flex: 1;
}
.wf-ex-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: all 0.2s; position: relative; overflow: hidden;
  flex-shrink: 0;
}
.wf-ex-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s;
}
.wf-ex-card:active { transform: scale(0.98); }
.wf-ex-card:active::before { opacity: 1; }
.wf-ex-card.is-done { opacity: 0.35; }
.wf-ex-card-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.wf-ex-card-name {
  font-size: 14px; font-weight: 700; color: var(--text);
  font-family: var(--font-display);
}
.wf-ex-card-meta { font-size: 11px; color: var(--text-muted); }
.wf-ex-card-check {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border); background: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--accent); flex-shrink: 0;
}
.wf-ex-card.is-done .wf-ex-card-check {
  border-color: var(--accent); background: var(--accent); color: #0a0a0a;
}

/* ── Back button (live → list) ── */
.wf-back {
  position: absolute; top: 12px; left: 14px;
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-size: 10px; color: var(--text-muted); cursor: pointer;
  font-family: var(--font-display); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  transition: all 0.15s;
}
.wf-back:active { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div style="font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:4px">
    Code affiché sur le téléphone<br>Paramètres → Connecter la montre
  </div>
  <input type="number" id="w-code" placeholder="Code 4 chiffres" inputmode="numeric"
    maxlength="4" style="text-align:center;font-size:28px;letter-spacing:0.2em;padding:14px">
  <button class="btn btn-accent" id="w-login">Connexion</button>
  <div id="w-login-err" style="color:var(--danger);font-size:11px;text-align:center"></div>
</div>

<!-- HOME — programme list -->
<div class="screen" id="screen-home">
  <div id="prog-list"></div>
</div>

<!-- LIVE SESSION -->
<div class="screen" id="screen-live">
  <div id="live-body"></div>
</div>

<!-- COUNTDOWN -->
<div class="countdown-overlay hidden" id="w-countdown">
  <div class="cd-ring-wrap">
    <svg class="cd-ring" viewBox="0 0 200 200" width="200" height="200">
      <circle class="cd-ring-bg" cx="100" cy="100" r="88" fill="none" stroke-width="5"/>
      <circle class="cd-ring-progress" id="w-cd-ring" cx="100" cy="100" r="88" fill="none"
        stroke="var(--accent)" stroke-width="5" stroke-linecap="round"
        transform="rotate(-90 100 100)" stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="cd-time-wrap">
      <div class="countdown-secs" id="w-countdown-secs">0</div>
    </div>
  </div>
  <div class="countdown-label" id="w-countdown-label"></div>
  <button class="btn btn-surface" id="w-countdown-skip" style="width:auto;padding:12px 28px">Passer</button>
</div>

<!-- DIALOG -->
<div class="dialog-overlay" id="dialog">
  <div class="dialog-box">
    <div class="dialog-msg" id="dialog-msg"></div>
    <div class="dialog-btns">
      <button class="btn btn-surface" id="dialog-cancel">Non</button>
      <button class="btn btn-accent" id="dialog-ok">Oui</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ═══════════════════════════════════════════════════════
   SUPABASE
═══════════════════════════════════════════════════════ */
const SUPABASE_URL  = 'https://ukhekyabqeyhkanwgpfx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVraGVreWFicWV5aGthbndncGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTgxMjAsImV4cCI6MjA5MDI3NDEyMH0.2j415bJ7jVoh8gRHmLj2QV_-tELSRJzzghtXrr51Ipc';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let currentUser = null;
let currentProfile = null;
let liveSession = null;
let currentScreen = 'login';
let pollTimer = null;

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id.replace('screen-', '');
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function migrateExercise(ex) {
  if (ex.activities) return ex;
  const type = ex.type === 'calisthenics' ? 'countdown' : 'weight';
  const s0 = ex.series?.[0] || {};
  const activity = {
    type,
    name:     ex.muscle   || '',
    reps:     type === 'weight' ? (ex.reps     ?? s0.reps     ?? 0) : 0,
    weight:   type === 'weight' ? (ex.weight   ?? s0.weight   ?? 0) : 0,
    duration: type !== 'weight' ? (ex.duration ?? s0.duration ?? 0) : 0,
    rest:     ex.rest ?? s0.rest ?? 0,
  };
  const series = ex.series
    ? ex.series.map(s => ({
        done: s.done ?? false, state: s.state || 'pending',
        values: [type === 'weight' ? { reps: s.reps || 0, weight: s.weight || 0 } : { duration: s.duration || 0 }],
      }))
    : Array.from({ length: ex.count ?? 3 }, () => ({
        done: false, state: 'pending',
        values: [type === 'weight' ? { reps: activity.reps, weight: activity.weight } : { duration: activity.duration }],
      }));
  return { name: ex.name, comment: ex.comment || '', sets: ex.count ?? ex.series?.length ?? 3, activities: [activity], series };
}

function showConfirm(msg, onOk) {
  const d = document.getElementById('dialog');
  document.getElementById('dialog-msg').textContent = msg;
  d.classList.add('active');
  const ok = document.getElementById('dialog-ok');
  const cancel = document.getElementById('dialog-cancel');
  const cleanup = () => { d.classList.remove('active'); ok.removeEventListener('click', handleOk); cancel.removeEventListener('click', cleanup); };
  const handleOk = () => { cleanup(); onOk(); };
  ok.addEventListener('click', handleOk);
  cancel.addEventListener('click', cleanup);
}

/* ═══════════════════════════════════════════════════════
   DB
═══════════════════════════════════════════════════════ */
async function getMyProfile() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return null;
  const { data } = await db.from('profiles').select('*').eq('id', user.id).single();
  return data;
}

async function loadProgrammes() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return [];
  const { data } = await db.from('programmes').select('*').eq('client_id', user.id).order('ordre');
  return (data || []).map(r => ({ id: r.id, name: r.name, category: r.category || 'fonte', exercises: r.exercises || [] }));
}

async function loadSessions() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return [];
  const { data } = await db.from('sessions').select('*').eq('client_id', user.id);
  return (data || []).map(r => ({
    id: r.id, programmeId: r.programme_id, programmeName: r.programme_name,
    category: r.category || 'fonte', date: r.date, startedAt: r.started_at,
    duration: r.duration, exercises: r.exercises || [], sync: r.sync || null,
  }));
}

async function pushSession(session) {
  const { data: { user } } = await db.auth.getUser();
  if (!user) return;
  await db.from('sessions').upsert({
    id: session.id, client_id: user.id,
    programme_name: session.programmeName, programme_id: session.programmeId || null,
    date: session.date, started_at: session.startedAt, duration: session.duration,
    exercises: session.exercises, category: session.category || 'fonte',
    sync: session.sync || null,
  });
}

function snapshot(dur = 0) {
  return {
    id: liveSession.id, programmeId: liveSession.programmeId,
    programmeName: liveSession.programmeName, category: liveSession.category || 'fonte',
    date: liveSession.date, startedAt: liveSession.startedAt, duration: dur,
    sync: liveSession.sync || null,
    exercises: liveSession.exercises.map(ex => {
      if (ex.type === 'cardio') {
        return {
          name: ex.name, type: 'cardio', comment: ex.comment || '',
          duration: ex.duration, power: ex.power,
          done: ex.done, state: ex.state,
        };
      }
      return {
        name: ex.name, comment: ex.comment || '', activities: ex.activities,
        series: ex.series.map(s => ({
          done: ex.activities.every((_, i) => s.activityStates?.[i] === 'done'),
          activityStates: s.activityStates || {}, values: s.values,
        })),
      };
    }),
  };
}

/* ═══════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════ */
document.getElementById('w-login').addEventListener('click', async () => {
  const code = document.getElementById('w-code').value.trim();
  const errEl = document.getElementById('w-login-err');
  if (code.length !== 4) { errEl.textContent = 'Code à 4 chiffres'; return; }

  // Chercher le code en base
  const { data, error } = await db.from('watch_codes').select('*').eq('code', code).limit(1).single();
  if (error || !data) { errEl.textContent = 'Code invalide'; return; }

  // Vérifier expiration (5 min)
  const age = Date.now() - new Date(data.created_at).getTime();
  if (age > 5 * 60 * 1000) {
    await db.from('watch_codes').delete().eq('id', data.id);
    errEl.textContent = 'Code expiré';
    return;
  }

  // Se connecter avec le refresh_token
  const { error: authErr } = await db.auth.refreshSession({ refresh_token: data.refresh_token });
  if (authErr) { errEl.textContent = 'Erreur de connexion'; return; }

  // Supprimer le code utilisé
  await db.from('watch_codes').delete().eq('id', data.id);

  currentUser = (await db.auth.getUser()).data.user;
  renderHome();
  startPolling();
});

/* ═══════════════════════════════════════════════════════
   HOME — programme selection
═══════════════════════════════════════════════════════ */
async function cyclicProgrammes(programmes) {
  if (!programmes.length) return { ordered: programmes };
  const sessions = await loadSessions();
  if (!sessions.length) return { ordered: programmes };
  const last = sessions.slice().sort((a, b) => {
    const ta = a.startedAt || a.date;
    const tb = b.startedAt || b.date;
    return tb.localeCompare(ta);
  })[0];
  const lastIdx = programmes.findIndex(p => p.id === last.programmeId);
  if (lastIdx === -1) return { ordered: programmes };
  const start = (lastIdx + 1) % programmes.length;
  return { ordered: [...programmes.slice(start), ...programmes.slice(0, start)] };
}

function resumeFromDB(session) {
  liveSession = {
    id: session.id, programmeId: session.programmeId,
    programmeName: session.programmeName, category: session.category || 'fonte',
    date: session.date, startedAt: session.startedAt,
    exercises: session.exercises.map(ex => {
      if (ex.type === 'cardio') {
        return {
          name: ex.name, type: 'cardio', comment: ex.comment || '',
          duration: ex.duration, power: ex.power,
          done: ex.done || { duration: 0, power: 0 },
          prev: ex.prev || null, state: ex.state || 'pending',
        };
      }
      const e = migrateExercise(ex);
      return {
        name: e.name, comment: e.comment || '', activities: e.activities,
        prevSeries: null,
        series: e.series.map(s => ({
          state: s.state || (s.done ? 'done' : 'pending'),
          activityStates: s.activityStates || {},
          values: s.values,
        })),
      };
    }),
  };
  if (liveSession.exercises.length > 1) {
    renderExerciseList();
  } else {
    watchExIdx = 0;
    renderLive();
  }
}

async function renderHome() {
  show('screen-home');
  const list = document.getElementById('prog-list');
  list.innerHTML = '<div class="loader">Chargement...</div>';

  if (!currentProfile) currentProfile = await getMyProfile();
  const sessions = await loadSessions();
  const programmes = await loadProgrammes();
  list.innerHTML = '';

  if (currentProfile?.prenom) {
    const greeting = document.createElement('p');
    greeting.className = 'greeting';
    greeting.textContent = `Bienvenue ${currentProfile.prenom}`;
    list.appendChild(greeting);
  }

  // Seance en cours (demarree sur telephone ou montre) ?
  const inProgress = sessions.find(s => s.duration === 0 || s.duration == null);
  if (inProgress?.exercises?.length) {
    const card = document.createElement('div');
    card.className = 'prog-card prog-card--active';
    card.innerHTML = `
      <div class="prog-label">Seance en cours</div>
      <div class="prog-name">${inProgress.programmeName}</div>
    `;
    card.addEventListener('click', () => resumeFromDB(inProgress));
    list.appendChild(card);

    addLogoutBtn(list);
    return;
  }

  // Pas de seance en cours → afficher le prochain programme par categorie
  const fonte = programmes.filter(p => (p.category || 'fonte') === 'fonte');
  const cardio = programmes.filter(p => p.category === 'cardio');

  if (!fonte.length && !cardio.length) {
    list.innerHTML += '<div class="loader">Aucun programme</div>';
    addLogoutBtn(list);
    return;
  }

  if (fonte.length) {
    const { ordered } = await cyclicProgrammes(fonte);
    const next = ordered[0];
    const m = next.exercises.map(e => migrateExercise(e));
    const exCount = m.length;
    const serCount = m.reduce((s, e) => s + (e.sets || e.series?.length || 3), 0);
    const card = document.createElement('div');
    card.className = 'prog-card';
    card.style.borderColor = 'var(--accent)';
    card.innerHTML = `
      <div class="prog-label">Fonte</div>
      <div class="prog-name">${next.name}</div>
      <div class="prog-meta">${exCount} exercices · ${serCount} series</div>
    `;
    card.addEventListener('click', () => startSession(next));
    list.appendChild(card);
  }

  if (cardio.length) {
    const { ordered } = await cyclicProgrammes(cardio);
    const next = ordered[0];
    const totalDur = next.exercises.reduce((s, e) => s + (e.duration || 0), 0);
    const card = document.createElement('div');
    card.className = 'prog-card';
    card.style.borderColor = 'var(--accent)';
    card.innerHTML = `
      <div class="prog-label">Cardio</div>
      <div class="prog-name">${next.name}</div>
      <div class="prog-meta">${next.exercises.length} machine${next.exercises.length > 1 ? 's' : ''} · ${totalDur} min</div>
    `;
    card.addEventListener('click', () => startSession(next));
    list.appendChild(card);
  }

  addLogoutBtn(list);
}

function addLogoutBtn(list) {
  const logoutBtn = document.createElement('button');
  logoutBtn.className = 'btn btn-surface';
  logoutBtn.textContent = 'Se deconnecter';
  logoutBtn.style.marginTop = '12px';
  logoutBtn.addEventListener('click', () => {
    showConfirm('Se deconnecter ?', async () => {
      await db.auth.signOut();
      currentUser = null;
      currentProfile = null;
      stopPolling();
      show('screen-login');
    });
  });
  list.appendChild(logoutBtn);
}

/* ═══════════════════════════════════════════════════════
   START SESSION
═══════════════════════════════════════════════════════ */
async function startSession(prog) {
  const sessions = await loadSessions();
  const prev = sessions.filter(s => s.programmeId === prog.id)
    .sort((a, b) => (b.startedAt || b.date).localeCompare(a.startedAt || a.date))[0] || null;

  const isCardio = prog.category === 'cardio';
  liveSession = {
    id: generateId(), programmeId: prog.id, programmeName: prog.name,
    category: prog.category || 'fonte', date: todayIso(), startedAt: new Date().toISOString(),
    exercises: isCardio
      ? prog.exercises.map(ex => {
          const prevEx = prev?.exercises?.find(e => e.name === ex.name) || null;
          return {
            name: ex.name, type: 'cardio', comment: ex.comment || '',
            duration: ex.duration || 0, power: ex.power || 0,
            done: { duration: ex.duration || 0, power: ex.power || 0 },
            prev: prevEx?.done || null, state: 'pending',
          };
        })
      : prog.exercises.map(ex => {
          const m = migrateExercise(ex);
          const sets = ex.sets ?? m.series.length ?? (ex.count ?? 3);
          const prevEx = prev?.exercises?.find(e => e.name === ex.name) || null;
          return {
            name: ex.name, comment: ex.comment || '', activities: m.activities,
            prevSeries: prevEx?.series || null,
            series: Array.from({ length: sets }, () => ({
              activityStates: {},
              values: m.activities.map(act =>
                act.type === 'weight'
                  ? { reps: act.reps || 0, weight: act.weight || 0 }
                  : { duration: act.duration || 0 }
              ),
            })),
          };
        }),
  };
  pushSession(snapshot()).catch(() => {});
  if (liveSession.exercises.length > 1) {
    renderExerciseList();
  } else {
    watchExIdx = 0;
    renderLive();
  }
}

/* ═══════════════════════════════════════════════════════
   LIVE SESSION
═══════════════════════════════════════════════════════ */
function isSeriesLocked(exIdx, sIdx) {
  if (sIdx === 0) return false;
  const ex = liveSession.exercises[exIdx];
  const prev = ex.series[sIdx - 1];
  return !ex.activities.every((_, i) => prev.activityStates?.[i] === 'done');
}

let watchExIdx = 0;

// Find the current (first non-done) series index for an exercise
function currentSeriesIdx(ex) {
  if (ex.type === 'cardio') return 0;
  for (let s = 0; s < ex.series.length; s++) {
    const allDone = ex.activities.every((_, a) => ex.series[s].activityStates?.[a] === 'done');
    if (!allDone) return s;
  }
  return ex.series.length - 1; // all done, show last
}

function renderExerciseList() {
  show('screen-live');
  const body = document.getElementById('live-body');
  body.innerHTML = '';

  // Finish button
  const finBtn = document.createElement('button');
  finBtn.className = 'wf-finish';
  finBtn.textContent = 'Terminer';
  finBtn.addEventListener('click', () => {
    showConfirm('Terminer la seance ?', () => {
      const dur = Math.round((Date.now() - new Date(liveSession.startedAt).getTime()) / 1000);
      pushSession(snapshot(dur)).catch(() => {});
      liveSession = null;
      stopWatchCountdown();
      renderHome();
    });
  });
  body.appendChild(finBtn);

  // Session title
  const title = document.createElement('div');
  title.className = 'wf-session-title';
  title.textContent = liveSession.programmeName;
  body.appendChild(title);

  // Exercise list
  const list = document.createElement('div');
  list.className = 'wf-ex-list';

  liveSession.exercises.forEach((ex, i) => {
    const isDone = ex.type === 'cardio'
      ? ex.state === 'done'
      : ex.series.every(s => ex.activities.every((_, a) => s.activityStates?.[a] === 'done'));

    const doneSeries = ex.type === 'cardio'
      ? (isDone ? 1 : 0)
      : ex.series.filter(s => ex.activities.every((_, a) => s.activityStates?.[a] === 'done')).length;
    const totalSeries = ex.type === 'cardio' ? 1 : ex.series.length;

    const card = document.createElement('div');
    card.className = 'wf-ex-card' + (isDone ? ' is-done' : '');

    const info = document.createElement('div');
    info.className = 'wf-ex-card-info';
    const name = document.createElement('div');
    name.className = 'wf-ex-card-name';
    name.textContent = ex.name;
    const meta = document.createElement('div');
    meta.className = 'wf-ex-card-meta';
    meta.textContent = isDone ? 'Termine' : `${doneSeries} / ${totalSeries} series`;
    info.append(name, meta);

    const check = document.createElement('div');
    check.className = 'wf-ex-card-check';
    check.textContent = isDone ? '✓' : '';

    card.append(info, check);
    card.addEventListener('click', () => { watchExIdx = i; renderLive(); });
    list.appendChild(card);
  });

  body.appendChild(list);
}

function renderLive() {
  show('screen-live');
  const body = document.getElementById('live-body');
  body.innerHTML = '';

  const exercises = liveSession.exercises;
  if (watchExIdx >= exercises.length) watchExIdx = exercises.length - 1;
  if (watchExIdx < 0) watchExIdx = 0;
  const ex = exercises[watchExIdx];
  const exIdx = watchExIdx;

  // Finish button (top right)
  const finBtn = document.createElement('button');
  finBtn.className = 'wf-finish';
  finBtn.textContent = 'Terminer';
  finBtn.addEventListener('click', () => {
    showConfirm('Terminer la seance ?', () => {
      const dur = Math.round((Date.now() - new Date(liveSession.startedAt).getTime()) / 1000);
      pushSession(snapshot(dur)).catch(() => {});
      liveSession = null;
      stopWatchCountdown();
      renderHome();
    });
  });
  body.appendChild(finBtn);

  // Exercise name
  const nameEl = document.createElement('div');
  nameEl.className = 'wf-exercise-name';
  nameEl.textContent = ex.name;
  body.appendChild(nameEl);

  // ── Cardio ──
  if (ex.type === 'cardio') {
    const label = document.createElement('div');
    label.className = 'wf-series-label';
    label.textContent = ex.state === 'done' ? 'Termine' : 'En cours';
    body.appendChild(label);

    const vals = document.createElement('div');
    vals.className = 'wf-values';
    const durVal = document.createElement('span'); durVal.className = 'wf-val'; durVal.textContent = ex.done?.duration || 0;
    const durUnit = document.createElement('span'); durUnit.className = 'wf-unit'; durUnit.textContent = 'min';
    const powVal = document.createElement('span'); powVal.className = 'wf-val'; powVal.textContent = ex.done?.power || 0;
    const powUnit = document.createElement('span'); powUnit.className = 'wf-unit'; powUnit.textContent = 'W';
    vals.append(durVal, durUnit, powVal, powUnit);
    body.appendChild(vals);

    if (ex.prev) {
      const prev = document.createElement('div');
      prev.className = 'wf-prev';
      prev.textContent = `Prec: ${ex.prev.duration || '—'} min · ${ex.prev.power || '—'} W`;
      body.appendChild(prev);
    }

    const doneBtn = document.createElement('button');
    doneBtn.className = 'wf-done-btn' + (ex.state === 'done' ? ' is-done' : '');
    doneBtn.textContent = ex.state === 'done' ? '✓' : '○';
    doneBtn.addEventListener('click', () => {
      ex.state = ex.state === 'done' ? 'pending' : 'done';
      pushSession(snapshot()).catch(() => {});
      renderLive();
    });
    body.appendChild(doneBtn);

  // ── Fonte ──
  } else {
    const sIdx = currentSeriesIdx(ex);
    const set = ex.series[sIdx];
    const act = ex.activities[0]; // primary activity
    const actIdx = 0;
    if (!set.activityStates) set.activityStates = {};
    if (set.activityStates[actIdx] === undefined) {
      set.activityStates[actIdx] = (set.done || set.state === 'done') ? 'done' : 'pending';
    }
    const state = set.activityStates[actIdx];
    const v = set.values?.[actIdx] || {};

    // Series label
    const label = document.createElement('div');
    label.className = 'wf-series-label';
    label.textContent = `Serie ${sIdx + 1} / ${ex.series.length}`;
    body.appendChild(label);

    // Values (read-only)
    const vals = document.createElement('div');
    vals.className = 'wf-values';
    const repsVal = document.createElement('span'); repsVal.className = 'wf-val'; repsVal.textContent = v.reps || 0;
    const sep = document.createElement('span'); sep.className = 'wf-sep'; sep.textContent = '×';
    const weightVal = document.createElement('span'); weightVal.className = 'wf-val'; weightVal.textContent = v.weight || 0;
    const unit = document.createElement('span'); unit.className = 'wf-unit'; unit.textContent = 'kg';
    vals.append(repsVal, sep, weightVal, unit);
    body.appendChild(vals);

    // Previous line
    const prevVal = ex.prevSeries?.[sIdx]?.values?.[actIdx];
    if (prevVal?.reps || prevVal?.weight) {
      const prev = document.createElement('div');
      prev.className = 'wf-prev';
      prev.textContent = `Prec: ${prevVal.reps ?? '—'} × ${prevVal.weight ?? '—'} kg`;
      body.appendChild(prev);
    }

    // Done button
    const doneBtn = document.createElement('button');
    doneBtn.className = 'wf-done-btn' + (state === 'done' ? ' is-done' : '');
    doneBtn.textContent = state === 'done' ? '✓' : '○';
    doneBtn.addEventListener('click', () => {
      if (state === 'done') return;
      set.activityStates[actIdx] = 'done';

      const rest = act?.rest || 0;
      if (rest > 0 && sIdx + 1 < ex.series.length) {
        liveSession.sync = { type: 'rest', startedAt: new Date().toISOString(), duration: rest, label: ex.name };
        startWatchCountdown(rest, ex.name);
      }

      pushSession(snapshot()).catch(() => {});
      renderLive();
    });
    body.appendChild(doneBtn);
  }

  // Back to exercise list (if multiple exercises)
  if (exercises.length > 1) {
    const backBtn = document.createElement('button');
    backBtn.className = 'wf-back';
    backBtn.textContent = '\u2190 Exercices';
    backBtn.addEventListener('click', renderExerciseList);
    body.appendChild(backBtn);
  }
}

/* ═══════════════════════════════════════════════════════
   COUNTDOWN — montre
═══════════════════════════════════════════════════════ */
let watchCountdownTimer = null;
let watchCountdownStartedAt = 0;

function startWatchCountdown(seconds, label) {
  stopWatchCountdown();
  if (!seconds || seconds <= 0) return;
  const overlay = document.getElementById('w-countdown');
  const secsEl  = document.getElementById('w-countdown-secs');
  const labelEl = document.getElementById('w-countdown-label');
  const ring    = document.getElementById('w-cd-ring');
  const CIRC    = 553;
  overlay.classList.remove('hidden');
  overlay.classList.remove('urgent');
  labelEl.textContent = label || '';
  watchCountdownStartedAt = Date.now();
  let remaining = seconds;
  secsEl.textContent = remaining;
  if (ring) { ring.style.transition = 'none'; ring.style.strokeDashoffset = '0'; requestAnimationFrame(() => { ring.style.transition = 'stroke-dashoffset 0.9s linear'; }); }
  watchCountdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      stopWatchCountdown();
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    } else {
      secsEl.textContent = remaining;
      if (ring) ring.style.strokeDashoffset = ((1 - remaining / seconds) * CIRC).toString();
      if (remaining <= 5) overlay.classList.add('urgent');
      if (remaining <= 3 && navigator.vibrate) navigator.vibrate(80);
    }
  }, 1000);
}

function stopWatchCountdown() {
  if (watchCountdownTimer) { clearInterval(watchCountdownTimer); watchCountdownTimer = null; }
  const overlay = document.getElementById('w-countdown');
  overlay.classList.add('hidden');
  overlay.classList.remove('urgent');
  if (liveSession?.sync?.type === 'rest') {
    liveSession.sync = null;
    pushSession(snapshot()).catch(() => {});
  }
}

document.getElementById('w-countdown-skip').addEventListener('click', stopWatchCountdown);

/* ═══════════════════════════════════════════════════════
   POLLING — sync avec le telephone
═══════════════════════════════════════════════════════ */
function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollSync, 500);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollSync() {
  if (!currentUser) return;
  try {
    const sessions = await loadSessions();
    const inProgress = sessions.find(s => s.duration === 0 || s.duration == null);

    if (currentScreen === 'home') {
      // Seance demarree sur le telephone → basculer en live
      if (inProgress?.exercises?.length) {
        resumeFromDB(inProgress);
      }
    } else if (currentScreen === 'live' && liveSession) {
      if (!inProgress) {
        // Seance terminee sur le telephone → retour accueil
        liveSession = null;
        renderHome();
        return;
      }
      // Sync les changements du telephone (series completees, valeurs modifiees)
      if (inProgress.id === liveSession.id) {
        syncLiveFromDB(inProgress);
      }
    }
  } catch { /* network error, skip */ }
}

function syncLiveFromDB(session) {
  let changed = false;
  session.exercises.forEach((dbEx, exIdx) => {
    const localEx = liveSession.exercises[exIdx];
    if (!localEx) return;

    // Cardio sync
    if (dbEx.type === 'cardio' && localEx.type === 'cardio') {
      if (dbEx.state !== localEx.state) { localEx.state = dbEx.state; changed = true; }
      if (dbEx.done?.duration !== localEx.done?.duration || dbEx.done?.power !== localEx.done?.power) {
        localEx.done = dbEx.done; changed = true;
      }
      return;
    }

    // Fonte sync
    const e = migrateExercise(dbEx);
    e.series.forEach((dbSet, sIdx) => {
      const localSet = localEx.series?.[sIdx];
      if (!localSet) return;
      const dbStates = dbSet.activityStates || {};
      localEx.activities?.forEach((_, actIdx) => {
        const dbState = dbStates[actIdx];
        const localState = localSet.activityStates?.[actIdx];
        if (dbState === 'done' && localState !== 'done') {
          if (!localSet.activityStates) localSet.activityStates = {};
          localSet.activityStates[actIdx] = 'done';
          changed = true;
        } else if (dbState === 'active' && localState === 'pending') {
          if (!localSet.activityStates) localSet.activityStates = {};
          localSet.activityStates[actIdx] = 'active';
          changed = true;
        }
      });
      (dbSet.values || []).forEach((dbVal, actIdx) => {
        const localVal = localSet.values?.[actIdx];
        if (!localVal) return;
        if (dbVal.reps !== localVal.reps || dbVal.weight !== localVal.weight) {
          localSet.values[actIdx] = { ...dbVal };
          changed = true;
        }
      });
    });
  });

  // Sync countdown from phone
  if (session.sync?.type === 'rest' && !watchCountdownTimer) {
    const elapsed = (Date.now() - new Date(session.sync.startedAt).getTime()) / 1000;
    const remaining = Math.round(session.sync.duration - elapsed);
    if (remaining > 1) {
      liveSession.sync = session.sync;
      startWatchCountdown(remaining, session.sync.label);
    }
  }
  // Countdown ended on phone (grace period: ignore stale pushes < 2s)
  if (!session.sync && watchCountdownTimer && Date.now() - watchCountdownStartedAt > 2000) {
    clearInterval(watchCountdownTimer); watchCountdownTimer = null;
    const cdOverlay = document.getElementById('w-countdown');
    cdOverlay.classList.add('hidden');
    cdOverlay.classList.remove('urgent');
  }

  if (changed) {
    // Refresh the current view (list or single exercise)
    const liveBody = document.getElementById('live-body');
    const isOnList = liveBody && liveBody.querySelector('.wf-ex-list');
    if (isOnList) renderExerciseList();
    else renderLive();
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    renderHome();
    startPolling();
  }
})();
